version: '3.9'

services:
  backend:
    restart: always
    command: gunicorn app.main:app -w 4 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000
    volumes: []  # No bind mounts in production
    environment:
      ENVIRONMENT: production

  celery_worker:
    restart: always
    volumes: []

  frontend:
    build:
      args:
        - NODE_ENV=production
    command: sh -c "npm run build && serve -s dist -l 5173"
    volumes: []

  db:
    restart: always
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data

  redis:
    restart: always
    volumes:
      - redis_data_prod:/data

  nginx:
    restart: always

volumes:
  postgres_data_prod:
  redis_data_prod:
